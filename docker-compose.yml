services:
  mysql:
    image: mysql:8.0
    container_name: firin-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: firin_db
      MYSQL_USER: firin_user
      MYSQL_PASSWORD: firin123
    volumes:
      - firin_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  firin_mysql_data:
